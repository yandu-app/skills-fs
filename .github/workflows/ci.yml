name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: test -z "$(gofmt -l .)" || (echo "gofmt would reformat:" && gofmt -l . && exit 1)

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go vet ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go test ./... -coverprofile=coverage.out
      - run: go tool cover -func=coverage.out
      - run: ./scripts/check_coverage.sh 85.0 coverage.out
      - run: go test -race ./core

  vulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  bench-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go test ./bench -bench . -benchmem -benchtime=100ms

  bench-gate:
    name: Benchmark gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go install golang.org/x/perf/cmd/benchstat@latest
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: baseline
      - name: Benchmark base
        run: |
          cd baseline
          go test ./bench -bench . -benchmem -count=3 -benchtime=500ms > /tmp/bench-base.txt
      - uses: actions/checkout@v4
        with:
          path: pr
      - name: Benchmark PR
        run: |
          cd pr
          go test ./bench -bench . -benchmem -count=3 -benchtime=500ms > /tmp/bench-pr.txt
      - name: Compare
        run: |
          benchstat /tmp/bench-base.txt /tmp/bench-pr.txt
          python3 pr/scripts/check_benchmarks.py /tmp/bench-base.txt /tmp/bench-pr.txt

  build-cross:
    name: Cross-platform build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: GOOS=${{ matrix.goos }} go build ./...

  test-cross:
    name: Cross-platform test
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go test ./... -count=1

  binding:
    name: Node N-API binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build go-bridge + node addon
        run: make binding-node
      - name: Smoke test
        run: npm test
        working-directory: binding/nodejs

  binding-python:
    name: Python ctypes binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build go-bridge
        run: make binding-python
      - name: Smoke test
        run: python3 test_skills_fs.py
        working-directory: binding/python
